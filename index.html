<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Simple Mirror - Fridge Combo</title>
    
    <link rel="apple-touch-icon" href="image_44.png">
    <link rel="icon" type="image/png" href="image_44.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #fafafa;
            --radius: 15px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            /* iOS Safari ツールバー/ノッチ対策 */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        #mirror-frame {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 20px 10px 20px;
            background-color: var(--bg);
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: var(--radius);
            transform: scaleX(-1); /* 鏡像反転 */
            background-color: var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            
            /* iOS Fix */
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main);
            opacity: 1 !important;
        }

        #status {
            position: absolute;
            color: var(--main);
            font-weight: bold;
            text-align: center;
            z-index: 10;
            padding: 20px;
        }

        footer {
            width: 100%;
            padding: 10px 0 15px 0;
            text-align: center;
            background-color: var(--bg);
            margin-bottom: env(safe-area-inset-bottom);
        }

        .kofi-button {
            display: inline-block;
            text-decoration: none;
            color: var(--main);
            background: var(--accent);
            padding: 8px 16px;
            border-radius: var(--radius);
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .credits {
            font-size: 9px;
            color: #999;
            letter-spacing: 0.5px;
        }

        /* フルスクリーン時のスタイル変更 */
        body.is-fullscreen footer {
            display: none;
        }
        body.is-fullscreen #mirror-frame {
            padding: 0;
        }
        body.is-fullscreen video {
            border-radius: 0;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div id="mirror-frame" onclick="toggleFullScreen()">
        <div id="status">Tap to activate mirror</div>
        <video id="video" autoplay playsinline></video>
    </div>

    <footer>
        <a href="https://ko-fi.com/afrorakda" class="kofi-button">☕️buy me a coffee</a>
        <div class="credits">No login / No tracking / No ads / Browser only Privacy Policy / afrorakda © 2026</div>
    </footer>

    <script>
        const video = document.getElementById('video');
        const statusText = document.getElementById('status');
        const body = document.body;

        async function startMirror() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "user",
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    } 
                });
                video.srcObject = stream;
                statusText.style.display = 'none';
            } catch (err) {
                statusText.innerText = "Camera access required for mirror.";
                console.error("Camera Error:", err);
            }
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().then(() => {
                    body.classList.add('is-fullscreen');
                }).catch(e => {
                    // フルスクリーン失敗時もカメラは継続
                    console.log("Fullscreen not available");
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen().then(() => {
                        body.classList.remove('is-fullscreen');
                    });
                }
            }
        }

        // ページロード時およびタブ復帰時に起動
        window.addEventListener('load', startMirror);
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') startMirror();
        });

        // フルスクリーン解除のイベント監視 (エスケープキー等対策)
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                body.classList.remove('is-fullscreen');
            }
        });
    </script>
</body>
</html>
