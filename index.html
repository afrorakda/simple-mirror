<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Simple Mirror - Fridge Combo</title>
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #fafafa;
            --radius: 15px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            font-family: -apple-system, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            /* iOSのSafeArea対応 */
            padding-top: env(safe-area-inset-top);
        }

        /* 鏡のメインエリア */
        #mirror-frame {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 20px 10px 20px;
            background-color: var(--bg);
            cursor: pointer;
            transition: padding 0.3s ease;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: var(--radius);
            transform: scaleX(-1);
            background-color: var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            -webkit-appearance: none;
            opacity: 1 !important;
        }

        /* フッター：ボタンが隠れないよう調整 */
        footer {
            width: 100%;
            padding: 10px 0 15px 0;
            text-align: center;
            background-color: var(--bg);
            margin-bottom: env(safe-area-inset-bottom);
            transition: opacity 0.3s ease;
        }

        .kofi-button {
            display: inline-block;
            text-decoration: none;
            color: var(--main);
            background: var(--accent);
            padding: 10px 20px;
            border-radius: var(--radius);
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .credits {
            font-size: 9px;
            color: #999;
            letter-spacing: 0.5px;
        }

        /* フルスクリーン時のスタイル切り替え */
        body.is-fullscreen footer {
            display: none;
        }
        body.is-fullscreen #mirror-frame {
            padding: 0;
        }
        body.is-fullscreen video {
            border-radius: 0;
        }

        #status {
            position: absolute;
            color: var(--main);
            font-weight: bold;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="mirror-frame" onclick="toggleFullScreen()">
        <div id="status">Tap to start mirror</div>
        <video id="video" autoplay playsinline></video>
    </div>

    <footer id="footer">
        <a href="https://ko-fi.com/afrorakda" class="kofi-button">☕️buy me a coffee</a>
        <div class="credits">No login / No tracking / No ads / Browser only Privacy Policy / afrorakda © 2026</div>
    </footer>

    <script>
        const video = document.getElementById('video');
        const statusText = document.getElementById('status');
        const body = document.body;

        async function startMirror() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "user",
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    } 
                });
                video.srcObject = stream;
                statusText.style.display = 'none';
            } catch (err) {
                statusText.innerText = "Camera access required.";
                console.error(err);
            }
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().then(() => {
                    body.classList.add('is-fullscreen');
                }).catch(e => {
                    // Safari等でフルスクリーンAPIが制限されている場合の代替処理
                    startMirror();
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen().then(() => {
                        body.classList.remove('is-fullscreen');
                    });
                }
            }
        }

        // フルスクリーン状態の変更を監視（ESCキー等での解除対策）
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                body.classList.remove('is-fullscreen');
            }
        });

        window.addEventListener('load', startMirror);
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') startMirror();
        });
    </script>
</body>
</html>
