<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Simple Mirror</title>
    
    <link rel="icon" href="image_44.png">
    <link rel="apple-touch-icon" href="image_44.png">

    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* Full-screen Mirror Area */
        #mirror-container {
            flex: 1;
            position: relative;
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror Flip */
            -webkit-appearance: none;
            opacity: 1 !important;
        }

        /* Floating Header */
        header {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 100;
            pointer-events: none;
        }
        h1 { 
            font-size: 1.4rem; font-weight: 900; letter-spacing: -1px; 
            color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); 
        }
        .hub-link {
            pointer-events: auto;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--main);
            background: rgba(255,255,255,0.9);
            padding: 6px 12px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }

        /* Floating Tips */
        #status-msg {
            position: absolute;
            z-index: 50;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            pointer-events: none;
            backdrop-filter: blur(5px);
            transition: opacity 0.5s;
        }

        /* Ultra-slim Bottom Bar */
        .bottom-bar {
            background: var(--bg);
            padding: 10px 15px calc(10px + env(safe-area-inset-bottom, 10px));
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border-top: 1px solid var(--accent);
            z-index: 100;
        }

        .bar-btn {
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 900;
            padding: 8px 12px;
            border-radius: 10px;
            white-space: nowrap;
        }
        .kofi-btn { background: var(--main); color: #fff; -webkit-text-fill-color: #fff; }
        .home-btn { background: var(--accent); color: var(--main); border: none; cursor: pointer; }

        footer {
            width: 100%;
            font-size: 0.65rem;
            color: #bbb;
            font-weight: 600;
            text-align: center;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        footer a { color: #999; text-decoration: underline; pointer-events: auto; }

        /* Fullscreen Mode */
        body.is-fullscreen .bottom-bar { display: none; }
        body.is-fullscreen header { opacity: 0.3; }

        /* Modal */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: #fff; width: 90%; max-width: 320px; padding: 35px;
            border-radius: var(--radius); text-align: left; position: relative;
        }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #ccc; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body id="body">

<header>
    <h1>Simple Mirror</h1>
    <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
</header>

<div id="mirror-container" onclick="toggleFullScreen()">
    <div id="status-msg">Starting camera...</div>
    <video id="video" autoplay playsinline muted></video>
</div>

<div class="bottom-bar">
    <a href="https://ko-fi.com/afrorakda" target="_blank" class="bar-btn kofi-btn">☕️buy me a coffee</a>
    <button class="bar-btn home-btn" onclick="showModal()">Add to Home</button>
    <footer>
        <a href="https://afrorakda.com/privacy/">Privacy Policy</a>
        <span>afrorakda © 2026</span>
    </footer>
</div>

<div id="modal" onclick="hideModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-x" onclick="hideModal()">×</span>
        <h3 style="margin-bottom: 10px; font-weight: 900;">📱 Install</h3>
        <div style="font-size: 0.9rem; line-height: 1.6; font-weight: 700;">
            <p>🍏 <strong>iPhone:</strong><br>Share > Add to Home Screen</p>
            <p style="margin-top:10px;">🤖 <strong>Android:</strong><br>Menu (⋮) > Add to Home Screen</p>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const statusMsg = document.getElementById('status-msg');
    const body = document.getElementById('body');

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } } 
            });
            video.srcObject = stream;
            statusMsg.innerText = "Maximize brightness for best use";
            setTimeout(() => { statusMsg.style.opacity = '0'; }, 3000);
        } catch (err) {
            statusMsg.innerText = "Camera access required.";
            statusMsg.style.background = "#e74c3c";
        }
    }

    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().then(() => {
                body.classList.add('is-fullscreen');
            }).catch(() => {
                body.classList.toggle('is-fullscreen');
            });
        } else {
            document.exitFullscreen().then(() => {
                body.classList.remove('is-fullscreen');
            });
        }
    }

    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement) body.classList.remove('is-fullscreen');
    });

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal').style.display = 'none'; }

    async function loadFooter() {
        try {
            const res = await fetch('footer.json');
            if (res.ok) {
                const data = await res.json();
                // JSONにフッターHTMLがあれば反映（ただしPrivacyリンクの構造は維持）
            }
        } catch (e) {}
    }

    window.onload = () => {
        initCamera();
        loadFooter();
    };

    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') initCamera();
    });
</script>

</body>
</html>
