<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mirror Max - Fridge Combo</title>
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #eee;
            --radius: 15px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Mirror Container (The Light Frame) */
        #mirror-container {
            position: relative;
            width: calc(100% - 30px); /* 15px margin each side */
            height: calc(100% - 100px); /* Leave space for footer */
            background: #fff;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Critical: Flip for mirror effect */
            border-radius: var(--radius);
            background-color: var(--accent);
            
            /* iOS Fix */
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main);
            opacity: 1 !important;
        }

        /* Error Message Style */
        #status {
            position: absolute;
            color: var(--main);
            text-align: center;
            padding: 20px;
            font-weight: bold;
            z-index: 1;
        }

        footer {
            height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: var(--main);
            text-align: center;
        }

        .kofi-button {
            margin-bottom: 5px;
            text-decoration: none;
            color: var(--main);
            background: var(--accent);
            padding: 5px 15px;
            border-radius: var(--radius);
            font-weight: bold;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="mirror-container">
        <div id="status">Allow camera access to use mirror.</div>
        <video id="video" autoplay playsinline></video>
    </div>

    <footer>
        <a href="https://ko-fi.com/afrorakda" class="kofi-button">☕️buy me a coffee</a>
        <div>No login / No tracking / No ads / Browser only Privacy Policy / afrorakda © 2026</div>
    </footer>

    <script>
        const video = document.getElementById('video');
        const statusText = document.getElementById('status');

        async function initMirror() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "user",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });
                video.srcObject = stream;
                statusText.style.display = 'none';
            } catch (err) {
                console.error("Error accessing camera: ", err);
                statusText.innerText = "Camera access denied or not supported.";
            }
        }

        // Initialize on load
        window.addEventListener('load', initMirror);

        // Visibility Change - Restart camera if user tabs back
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                initMirror();
            }
        });
    </script>
</body>
</html>
